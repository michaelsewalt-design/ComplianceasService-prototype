<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compliance as a Service Portal</title>
  <link rel="stylesheet" href="/assets/shared/portal.css" />
  <link rel="stylesheet" href="/assets/shared/contact-form.css" />
  <link rel="stylesheet" href="/assets/shared/news.css" />
</head>
<body>
  <div class="page-shell">

    <header class="hero">
      <div class="hero-top">
        <div class="hero-copy">
          <span class="eyebrow">Compliance as a Service</span>
          <h1>One portal for training, operations, and compliance tooling.</h1>
          <p>Launch the modules your teams need today.</p>
        </div>

        <div class="news-box">
          <h3>Latest Compliance News</h3>
          <ul id="news-list">
            <li>Loading...</li>
          </ul>
        </div>
      </div>

      <div class="contact-hero-cta-wrap">
        <button class="contact-hero-cta" data-open-contact-modal>
          Contact PROTIVITI Compliance advisory services
        </button>
      </div>
    </header>

    <main>
      <section id="modules" class="section">
        <h2>Core modules</h2>
        <div class="module-grid">
          <a class="module-card active" href="/training">
            <h3>Training Module</h3>
          </a>
          <a class="module-card active" href="/incident-request">
            <h3>Incident & Request Module</h3>
          </a>
        </div>
      </section>
    </main>

  </div>

  <script src="/assets/shared/contact-form.js" defer></script>
  <script src="/assets/shared/news.js" defer></script>
</body>
</html>
